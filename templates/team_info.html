{% extends "base.html" %}

{% block title %}Team Info{% endblock %}

{% block content %}
  <div class="container-fluid">
    <h2>Team Info</h2>
    <form method="POST" class="form-inline" role="form" id="lb_form">
      <div class="row mb-3">
        <div class="col-sm-4">
          <select id='teams' name='teams' onchange="this.form.submit()" class="form-select form-select-sm mb-3">
            {% for t in teams %}
            <option value="{{ t }}" {{ 'selected' if team == t }}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-4">
          <select id='season' name='season' onchange="this.form.submit()" class="form-select form-select-sm">
            {% for year in available_years %}
            <option value="{{ year }}" {{ 'selected' if season == year }}>{{ year }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </form>
    {% if no_data %}
    <div class="alert alert-info mt-3">No stats available yet for the {{ season }} season.</div>
    {% else %}
    <div style="padding-top: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch;">
      <div style="min-width: 300px; height: 400px; position: relative;">
        <canvas id="radar-chart"></canvas>
      </div>
    </div>
    <div style="padding-top: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch;">
      <div style="min-width: 300px; height: 400px; position: relative;">
        <canvas id="horiz-bar-chart"></canvas>
      </div>
    </div>
    {% endif %}
  </div>
{% endblock %}

{% block scripts %}
  {% if not no_data %}
  <script>
      $('#season').on('change', function(){
          $('#teams').val('');
      });

      new Chart(document.getElementById("radar-chart"), {
          type: 'radar',
          data: {
              labels: [{% for item in ranks_labels %}"{{ item|safe }}",{% endfor %}],
              datasets: [
                  {
                      label: "Values",
                      backgroundColor: 'rgba(255,0,0,0.1)',
                      data: [{% for item in ranks %}{{ item }},{% endfor %}]
                  },
              ]
          },
          options: {
              plugins: {
                  legend: { display: false },
                  title: { display: true, text: 'Radar Chart' },
              },
              scales: {
                  r: {
                      max: 12,
                      beginAtZero: true
                  }
              },
              responsive: true,
              maintainAspectRatio: false,
          }
      });

      new Chart(document.getElementById("horiz-bar-chart"), {
          type: 'bar',
          data: {
              labels: [{% for item in stats_labels %}"{{ item|safe }}",{% endfor %}],
              datasets: [
                  {
                      label: "{{ team|safe }}",
                      backgroundColor: 'rgba(214, 233, 198, 0.8)',
                      data: [{% for item in stats %}{{ item }},{% endfor %}]
                  },
                  {
                      label: "League Average",
                      backgroundColor: 'rgba(250, 235, 204, 0.8)',
                      data: [{% for item in league_avg %}{{ item }},{% endfor %}]
                  },
              ]
          },
          options: {
              indexAxis: 'y',
              plugins: {
                  legend: { display: true },
                  title: { display: true, text: 'Team vs League Avg (Counting Stats)' },
              },
              responsive: true,
              maintainAspectRatio: false,
          }
      });
  </script>
  {% endif %}
{% endblock %}
