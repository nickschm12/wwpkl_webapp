<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="refresh" content="3600">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}WWPKL{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js" integrity="sha384-SR1sx49pcuLnqZUnnPwx6FCym0wLsk5JZuNx2bPPENzswTNFaQU1RDvt3wT4gWFG" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.min.js" integrity="sha384-j0CNLUeiqtyaRmlzUHCPZ+Gy5fQu0dQ6eZ/xAww941Ai1SxSY+0EQqNXNE6DZiVc" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  </head>
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-nav" style="background-color: var(--theme-primary);">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">WWPKL</a>
      <button id="theme-toggle" class="btn btn-sm btn-outline-light me-2" onclick="toggleTheme()"></button>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'home' %}active{% endif %}" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'team_info' %}active{% endif %}" href="/team_info">Team Info</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'transactions' %}active{% endif %}" href="/transactions">Transactions</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'rulebook' %}active{% endif %}" href="/rulebook">Rulebook</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'record_book' %}active{% endif %}" href="/record_book">Record Book</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'projections' %}active{% endif %}" href="/projections">Projections</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <script>
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-toggle').textContent = theme === 'north' ? '🟢 South' : '🔵 North';
    }
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'north' ? 'south' : 'north';
      localStorage.setItem('wwpkl-theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('wwpkl-theme') || 'south');
  </script>
  <body>
    {% block content %}{% endblock %}
  </body>
  {% block scripts %}{% endblock %}
  <script>
    // Reusable column sort for any table with class "sortable-table"
    // Mark sortable <th> elements with class "sortable"
    document.querySelectorAll('.sortable-table').forEach(function(table) {
      var sortState = {};
      table.querySelectorAll('th.sortable').forEach(function(th) {
        th.addEventListener('click', function() {
          var colIdx = Array.from(th.parentElement.children).indexOf(th);
          var asc = !sortState[colIdx];
          sortState[colIdx] = asc;

          // Update icons
          table.querySelectorAll('th.sortable .sort-icon').forEach(function(icon) {
            icon.textContent = '⇅';
          });
          th.querySelector('.sort-icon').textContent = asc ? '↑' : '↓';

          var tbody = table.querySelector('tbody');
          var rows = Array.from(tbody.querySelectorAll('tr'));
          rows.sort(function(a, b) {
            var aVal = a.children[colIdx].textContent.trim();
            var bVal = b.children[colIdx].textContent.trim();
            var aNum = parseFloat(aVal.replace(/[^0-9.\-]/g, ''));
            var bNum = parseFloat(bVal.replace(/[^0-9.\-]/g, ''));
            // Treat '—' as worst value
            var aEmpty = (aVal === '—' || aVal === '');
            var bEmpty = (bVal === '—' || bVal === '');
            if (aEmpty && bEmpty) return 0;
            if (aEmpty) return 1;
            if (bEmpty) return -1;
            if (!isNaN(aNum) && !isNaN(bNum)) {
              return asc ? aNum - bNum : bNum - aNum;
            }
            return asc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          });
          rows.forEach(function(row) { tbody.appendChild(row); });
        });
      });

      // Default sort by Rank ascending, or Cost descending if no Rank column
      var rankTh = Array.from(table.querySelectorAll('th.sortable')).find(function(th) {
        return th.textContent.trim().startsWith('Rank');
      });
      if (rankTh) {
        rankTh.click();
      } else {
        var costTh = Array.from(table.querySelectorAll('th.sortable')).find(function(th) {
          return th.textContent.trim().startsWith('Cost');
        });
        if (costTh) { costTh.click(); costTh.click(); } // two clicks = descending
      }
    });
  </script>
</html>
